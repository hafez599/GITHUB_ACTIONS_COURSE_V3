name: 04 Deploy Workflow
on:
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

permissions:
  actions: read
  contents: read

jobs:
  deploy-package:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull image from ECR
        run: docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Start container
        run: |
          docker run -d \
            --name "${{ env.CONTAINER_NAME }}" \
            -p "${{ env.APP_PORT }}:8000" \
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}

      - name: Smoke test deployed app
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${{ env.APP_PORT }}/health"; then
              exit 0
            fi
            echo "Attempt $attempt failed, waiting..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Validate container is running with docker ps
        run: docker ps | grep "${{ env.CONTAINER_NAME }}" | grep -i "up"

      - name: Validate /health endpoint
        run: curl --fail http://localhost:${{ env.APP_PORT }}/health

      - name: Stop container
        if: always()
        run: docker rm -f "${{ env.CONTAINER_NAME }}" || true
