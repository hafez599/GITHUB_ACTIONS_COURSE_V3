name: 02 CI Workflow
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
          os: [ubuntu-latest]
          version: ["3.11" , "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run tests
        run: python -m unittest discover -s tests -v


      - name: Build an image from Dockerfile
        run: docker build -t docker.io/hafez599/my-app:${{ github.sha }} .

      # Save Docker image to a tar file and upload as artifact
      - name: Save Docker image as tar
        run: docker save docker.io/hafez599/my-app:${{ github.sha }} -o my-app.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.version }}
          path: my-app.tar
          retention-days: 7

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'docker.io/hafez599/my-app:${{ github.sha }}'
          format: 'json'                        
          output: 'trivy-image-report.json'    
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Upload Trivy scan report as artifact
      - name: Upload Trivy scan report artifact
        if: always()     
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.version }}
          path: trivy-image-report.json
          retention-days: 7
