# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

# Run automatically when app code, tests, or this workflow file changes.
on:
  pull_request:
    branches: [main]
      
  # Allow a safe manual run before students trigger it with a code change.
  schedule:
    - cron: '0 10 * * *' 
    
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to run the workflow'
        required: true
        type: string
        default: 'in 1 hour'

jobs:
  run-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        version: ['3.11', '3.12'] # Bolding version strings keeps trailing zeros safe
    
    # The runner is the temporary machine that executes the steps below.
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v4
      
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: .trivy-cache
          key: ${{ runner.os }}-trivy-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-trivy-

      - name: repo validation
        run: ls 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.version }}

      - name: Repository & Dockerfile Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,misconfig,secret'
          cache-dir: '.trivy-cache'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          format: 'table'

      - name: python validation 
        run: python --version

      - name: Print current time
        run: date

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

      # --- DOCKER STEPS (Restricted to Ubuntu-only to avoid macOS crashes) ---

      - name: Build Docker Image
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker build -t myapp:${{ github.sha }} -f ./Dockerfile .

      - name: Compiled Image Scan
        if: matrix.os == 'ubuntu-latest'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'myapp:${{ github.sha }}'
          cache-dir: '.trivy-cache'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          format: 'table'
