# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
      
  # Allow a safe manual run before students trigger it with a code change.
  schedule:
    - cron: '0 10 * * *' 
    
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to run the workflow'
        required: true
        type: string
        default: 'in 1 hour'

# Global environment variables (accessible by all jobs and steps)
# env:
#   PYTHON_VERSION: ${{ secrets.PYTHON_VERSION }}

jobs:
  run-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        version: [3.11, 3.12]
    # The runner is the temporary machine that executes the steps below.
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: repo validation
        run: ls 

      - name: Set up Python
        # Prepare Python on the runner using the global env variable.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.version }}

      - name: python validation 
        run: python --version

      - name: Print current time
        run: date

      - name: Log the environment variable
        run: echo "python version is  $PYTHON_VERSION"

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v
